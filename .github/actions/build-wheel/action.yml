name: 'Build Wheel'
description: 'Clone source, apply patches, build wheel, rename with CUDA+PyTorch suffix'

inputs:
  source-repo:
    description: 'Source repository (e.g., thu-ml/SageAttention)'
    required: true
  source-tag:
    description: 'Git tag or branch to checkout'
    required: false
    default: ''
  pre-build-script:
    description: 'Script to run before building (patches, etc.)'
    required: false
    default: ''
  arch-list:
    description: 'CUDA architectures to build for (auto-computed by generate_matrix.py)'
    required: true
  cuda-version:
    description: 'Full CUDA version (e.g., 12.4)'
    required: true
  cuda-short:
    description: 'Short CUDA version (e.g., 124)'
    required: true
  pytorch-version:
    description: 'PyTorch version (e.g., 2.4.0)'
    required: true
  platform:
    description: 'Platform (linux or windows)'
    required: true
  max-jobs:
    description: 'Max parallel compilation jobs'
    required: false
    default: '1'
  clone-recursive:
    description: 'Clone with --recursive for submodules'
    required: false
    default: 'false'
  patch-script:
    description: 'Path to patch script (Python file) to run before building'
    required: false
    default: ''
  build-subdir:
    description: 'Subdirectory to build from (for monorepos)'
    required: false
    default: ''

outputs:
  wheel-path:
    description: 'Path to the built wheel'
    value: ${{ steps.rename.outputs.wheel-path }}

runs:
  using: 'composite'
  steps:
    - name: Clone source
      shell: bash
      run: |
        RECURSIVE_FLAG=""
        if [ "${{ inputs.clone-recursive }}" == "true" ]; then
          RECURSIVE_FLAG="--recursive"
        fi
        git clone $RECURSIVE_FLAG https://github.com/${{ inputs.source-repo }}.git source
        cd source
        if [ -n "${{ inputs.source-tag }}" ]; then
          git checkout ${{ inputs.source-tag }}
        fi

    - name: Apply patch script
      if: inputs.patch-script != ''
      shell: bash
      run: |
        cd source
        python $GITHUB_WORKSPACE/${{ inputs.patch-script }}

    - name: Pre-build script
      if: inputs.pre-build-script != ''
      shell: bash
      run: |
        cd source
        ${{ inputs.pre-build-script }}

    - name: Build wheel (Linux)
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        BUILD_DIR="source"
        if [ -n "${{ inputs.build-subdir }}" ]; then
          BUILD_DIR="source/${{ inputs.build-subdir }}"
        fi
        cd $BUILD_DIR
        export TORCH_CUDA_ARCH_LIST="${{ inputs.arch-list }}"
        export CUDA_HOME=/usr/local/cuda-${{ inputs.cuda-version }}
        export MAX_JOBS=${{ inputs.max-jobs }}
        export FORCE_CUDA=1
        export LIBRARY_PATH=/usr/local/cuda-${{ inputs.cuda-version }}/lib64/stubs:${LIBRARY_PATH:-}
        export CUMM_CUDA_VERSION="${{ inputs.cuda-version }}"
        export CUMM_CUDA_ARCH_LIST="${{ inputs.arch-list }}"
        export CUMM_DISABLE_JIT=1
        export SPCONV_DISABLE_JIT=1
        pip wheel . --no-build-isolation --no-deps -v -w dist

    - name: Repair wheel (Linux)
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        pip install auditwheel patchelf
        BUILD_DIR="source"
        if [ -n "${{ inputs.build-subdir }}" ]; then
          BUILD_DIR="source/${{ inputs.build-subdir }}"
        fi
        export LD_LIBRARY_PATH=/usr/local/cuda-${{ inputs.cuda-version }}/lib64:${LD_LIBRARY_PATH:-}
        cd $BUILD_DIR/dist
        for whl in *.whl; do
          if [[ "$whl" == *"-py3-none-any.whl" ]]; then
            continue
          fi
          if auditwheel repair "$whl" \
            --plat manylinux_2_35_x86_64 \
            -w repaired/ \
            --exclude libcuda.so \
            --exclude libcuda.so.1 \
            --exclude libcudart.so \
            --exclude libtorch.so \
            --exclude libtorch_cpu.so \
            --exclude libtorch_cuda.so \
            --exclude libtorch_python.so \
            --exclude libc10.so \
            --exclude libc10_cuda.so; then
            rm "$whl"
          else
            echo "::warning::auditwheel repair failed for $whl, using original"
          fi
        done
        if [ -d repaired ] && ls repaired/*.whl 1>/dev/null 2>&1; then
          mv repaired/*.whl .
          rm -rf repaired/
        fi

    - name: Setup MSVC (Windows)
      if: inputs.platform == 'windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Build wheel (Windows)
      if: inputs.platform == 'windows'
      shell: powershell
      run: |
        $pythonPath = (python -c "import sys; print(sys.prefix)")
        $scriptsPath = "$pythonPath\Scripts"
        $env:PATH = "$scriptsPath;$env:PATH"
        Write-Host "Checking ninja..."
        ninja --version

        $buildDir = "source"
        if ("${{ inputs.build-subdir }}" -ne "") {
          $buildDir = "source/${{ inputs.build-subdir }}"
        }
        cd $buildDir
        $env:TORCH_CUDA_ARCH_LIST = "${{ inputs.arch-list }}"
        $env:MAX_JOBS = "${{ inputs.max-jobs }}"
        $env:DISTUTILS_USE_SDK = "1"
        $env:FORCE_CUDA = "1"
        $env:CUMM_CUDA_VERSION = "${{ inputs.cuda-version }}"
        $env:CUMM_CUDA_ARCH_LIST = "${{ inputs.arch-list }}"
        $env:CUMM_DISABLE_JIT = "1"
        $env:SPCONV_DISABLE_JIT = "1"
        pip wheel . --no-build-isolation --no-deps -v -w dist

    - name: Rename wheel with CUDA+PyTorch suffix (Linux)
      if: inputs.platform == 'linux'
      id: rename-linux
      shell: bash
      run: |
        BUILD_DIR="source"
        if [ -n "${{ inputs.build-subdir }}" ]; then
          BUILD_DIR="source/${{ inputs.build-subdir }}"
        fi
        cd $BUILD_DIR/dist
        CUDA_SHORT="${{ inputs.cuda-short }}"
        TORCH_MM=$(echo "${{ inputs.pytorch-version }}" | cut -d. -f1,2)
        for f in *.whl; do
          if [[ "$f" == *"-py3-none-any.whl" ]]; then
            echo "WARNING: Built pure Python wheel $f - CUDA compilation may have failed"
            newname="$f"
          else
            newname=$(echo "$f" | sed "s/-cp/+cu${CUDA_SHORT}torch${TORCH_MM}-cp/")
            mv "$f" "$newname"
          fi
          echo "wheel-path=$BUILD_DIR/dist/$newname" >> $GITHUB_OUTPUT
        done
        mkdir -p $GITHUB_WORKSPACE/dist
        cp *.whl $GITHUB_WORKSPACE/dist/

    - name: Rename wheel with CUDA+PyTorch suffix (Windows)
      if: inputs.platform == 'windows'
      id: rename-windows
      shell: powershell
      run: |
        $buildDir = "source"
        if ("${{ inputs.build-subdir }}" -ne "") {
          $buildDir = "source/${{ inputs.build-subdir }}"
        }
        cd "$buildDir\dist"
        $cudaShort = "${{ inputs.cuda-short }}"
        $torchMM = "${{ inputs.pytorch-version }}".Split('.')[0..1] -join '.'
        Get-ChildItem *.whl | ForEach-Object {
          if ($_.Name -like "*-py3-none-any.whl") {
            Write-Host "WARNING: Built pure Python wheel $($_.Name) - CUDA compilation may have failed"
            $newName = $_.Name
          } else {
            $newName = $_.Name -replace '^([^-]+-[^-]+)-cp', "`$1+cu${cudaShort}torch${torchMM}-cp"
            Rename-Item $_.FullName $newName
          }
          echo "wheel-path=$buildDir/dist/$newName" >> $env:GITHUB_OUTPUT
        }
        New-Item -ItemType Directory -Force -Path $env:GITHUB_WORKSPACE\dist | Out-Null
        Copy-Item *.whl $env:GITHUB_WORKSPACE\dist\

    - name: Fix wheel METADATA version
      shell: bash
      run: |
        python $GITHUB_WORKSPACE/scripts/patch_wheel_version.py $GITHUB_WORKSPACE/dist

    - name: Set wheel-path output
      id: rename
      shell: bash
      run: |
        if [ "${{ inputs.platform }}" == "linux" ]; then
          echo "wheel-path=${{ steps.rename-linux.outputs.wheel-path }}" >> $GITHUB_OUTPUT
        else
          echo "wheel-path=${{ steps.rename-windows.outputs.wheel-path }}" >> $GITHUB_OUTPUT
        fi
