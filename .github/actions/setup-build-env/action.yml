name: 'Setup Build Environment'
description: 'Install Python, PyTorch, and build dependencies with caching'

inputs:
  python-version:
    description: 'Python version (e.g., 3.11)'
    required: true
  pytorch-version:
    description: 'PyTorch version (e.g., 2.4.0)'
    required: true
  cuda-short:
    description: 'CUDA short version (e.g., 124)'
    required: true
  platform:
    description: 'Platform (linux or windows)'
    required: true
  extra-deps:
    description: 'Extra pip dependencies'
    required: false
    default: ''
  github-cache:
    description: 'Use GitHub Actions cache restore/save'
    required: false
    default: 'true'

outputs:
  cache-hit:
    description: 'Whether uv cache was restored'
    value: ${{ steps.uv-cache.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Setup Python ${{ inputs.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: ${{ inputs.python-version }}

    # ============== LINUX ==============
    - name: Restore uv cache (Linux)
      if: inputs.platform == 'linux' && inputs.github-cache == 'true'
      id: uv-cache-linux
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/uv
        key: uv-linux-cu${{ inputs.cuda-short }}-torch${{ inputs.pytorch-version }}

    - name: Install dependencies (Linux)
      if: inputs.platform == 'linux'
      shell: bash
      run: |
        if [ "${{ inputs.github-cache }}" != "true" ]; then
          CACHE_ROOT="${WHEELS_LOCAL_CACHE_ROOT:-${RUNNER_WORKSPACE:-$HOME}/../_wheels_cache}"
          export UV_CACHE_DIR="$CACHE_ROOT/uv"
          export PIP_CACHE_DIR="$CACHE_ROOT/pip"
          export UV_LINK_MODE="${UV_LINK_MODE:-copy}"
          mkdir -p "$UV_CACHE_DIR" "$PIP_CACHE_DIR"
          echo "Using local uv cache: $UV_CACHE_DIR"
          echo "Using local pip cache: $PIP_CACHE_DIR"
        fi

        python -m pip install --cache-dir "${PIP_CACHE_DIR:-$HOME/.cache/pip}" uv
        uv pip install --system torch==${{ inputs.pytorch-version }} --index-url https://download.pytorch.org/whl/cu${{ inputs.cuda-short }}
        uv pip install --system wheel setuptools ninja numpy triton packaging ${{ inputs.extra-deps }}

    - name: Save uv cache (Linux)
      if: |
        inputs.platform == 'linux' && steps.uv-cache-linux.outputs.cache-hit != 'true' &&
        inputs.github-cache == 'true' &&
        ((inputs.cuda-short == '124' && inputs.pytorch-version == '2.4.0') ||
         (inputs.cuda-short == '128' && inputs.pytorch-version == '2.8.0'))
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/uv
        key: uv-linux-cu${{ inputs.cuda-short }}-torch${{ inputs.pytorch-version }}

    # ============== WINDOWS ==============
    - name: Restore uv cache (Windows)
      if: inputs.platform == 'windows' && inputs.github-cache == 'true'
      id: uv-cache-windows
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~\AppData\Local\uv\cache
        key: uv-windows-cu${{ inputs.cuda-short }}-torch${{ inputs.pytorch-version }}

    - name: Install dependencies (Windows)
      if: inputs.platform == 'windows'
      shell: bash
      run: |
        pip install uv
        uv pip install --system torch==${{ inputs.pytorch-version }} --index-url https://download.pytorch.org/whl/cu${{ inputs.cuda-short }}
        uv pip install --system wheel setuptools ninja numpy packaging ${{ inputs.extra-deps }}

    - name: Patch PyTorch header for Windows MSVC bug
      if: inputs.platform == 'windows'
      shell: bash
      run: |
        # Fix for https://github.com/pytorch/pytorch/issues/166123
        TORCH_PATH=$(python -c "import torch; print(torch.__path__[0])")
        HEADER_FILE="$TORCH_PATH/include/torch/csrc/dynamo/compiled_autograd.h"
        if [ -f "$HEADER_FILE" ]; then
          echo "Patching $HEADER_FILE for MSVC std:: ambiguity bug"
          sed -i 's/} else if constexpr (::std::is_same_v<T, ::std::string>) {/\/\/ PATCHED: } else if constexpr (::std::is_same_v<T, ::std::string>) {/' "$HEADER_FILE"
          sed -i 's/return at::StringType::get();/\/\/ PATCHED: return at::StringType::get();/' "$HEADER_FILE"
          echo "Patch applied successfully"
        else
          echo "Header file not found (may not be needed for this PyTorch version)"
        fi

    - name: Save uv cache (Windows)
      if: |
        inputs.platform == 'windows' && steps.uv-cache-windows.outputs.cache-hit != 'true' &&
        inputs.github-cache == 'true' &&
        ((inputs.cuda-short == '124' && inputs.pytorch-version == '2.4.0') ||
         (inputs.cuda-short == '128' && inputs.pytorch-version == '2.8.0'))
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~\AppData\Local\uv\cache
        key: uv-windows-cu${{ inputs.cuda-short }}-torch${{ inputs.pytorch-version }}

    # Set combined output
    - name: Set cache-hit output
      id: uv-cache
      shell: bash
      run: |
        if [ "${{ inputs.platform }}" == "linux" ]; then
          echo "cache-hit=${{ steps.uv-cache-linux.outputs.cache-hit || 'false' }}" >> $GITHUB_OUTPUT
        else
          echo "cache-hit=${{ steps.uv-cache-windows.outputs.cache-hit || 'false' }}" >> $GITHUB_OUTPUT
        fi
