name: Build Dev Machine FlashAttn Wheels
run-name: Build dev machine flash_attn wheels on nasferatu

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UV_LINK_MODE: copy
  UV_HTTP_TIMEOUT: "600"

on:
  push:
    branches:
      - issue_100
    paths:
      - .github/workflows/build-dev-machine-flash-attn.yml
  workflow_dispatch:

concurrency:
  group: build-dev-machine-flash-attn
  cancel-in-progress: false

jobs:
  interceptor-flash-attn:
    name: interceptor flash_attn py3.12 cu128 torch2.11.0
    runs-on: [self-hosted, Linux, X64, fa3-builder, nasferatu-fa3]
    env:
      TMPDIR: /opt/runner/_work/_temp
      TMP: /opt/runner/_work/_temp
      TEMP: /opt/runner/_work/_temp
      RUNNER_MAX_JOBS: "6"
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Confirm runner and exact tuple
        shell: bash
        run: |
          mkdir -p benchmark-info
          case "${RUNNER_NAME:-$(hostname)}" in
            nasferatu-fa3|nasferatu*)
              ;;
            *)
              echo "::error::Expected NASferatu runner, got ${RUNNER_NAME:-$(hostname)}"
              exit 1
              ;;
          esac
          {
            echo "RUNNER_NAME=${RUNNER_NAME:-$(hostname)}"
            echo "RUNNER_OS=${RUNNER_OS:-Linux}"
            echo "CONFIGURED_MAX_JOBS=${RUNNER_MAX_JOBS}"
            echo "MACHINE=interceptor"
            echo "PACKAGE=flash_attn"
            echo "PYTHON=3.12"
            echo "CUDA=12.8"
            echo "CUDA_SHORT=128"
            echo "PYTORCH=2.11.0"
            echo "ARCH_LIST=8.0 9.0 10.0 12.0"
            echo "EXPECTED_WHEEL_PREFIX=flash_attn-2.8.3+cu128torch2.11-cp312-cp312-"
          } | tee benchmark-info/runner.txt

      - name: Check origin and upstream
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          RELEASE="flash_attn-latest"
          PREFIX="flash_attn-2.8.3+cu128torch2.11-cp312-cp312-"
          ORIGIN_MATCH=$(gh release view "$RELEASE" --repo pollockjj/wheels --json assets -q ".assets[].name" 2>/dev/null | grep -F "$PREFIX" | grep -E "manylinux|linux_x86_64" | head -1 || true)
          if [ -n "$ORIGIN_MATCH" ]; then
            echo "mode=origin_exists" >> "$GITHUB_OUTPUT"
            echo "wheel=$ORIGIN_MATCH" >> "$GITHUB_OUTPUT"
            echo "Origin already has $ORIGIN_MATCH"
            exit 0
          fi
          UPSTREAM_MATCH=$(gh release view "$RELEASE" --repo Comfy-Org/wheels --json assets -q ".assets[].name" 2>/dev/null | grep -F "$PREFIX" | grep -E "manylinux|linux_x86_64" | head -1 || true)
          if [ -n "$UPSTREAM_MATCH" ]; then
            gh release download "$RELEASE" --repo Comfy-Org/wheels -p "$UPSTREAM_MATCH" -D dist
            echo "mode=stolen" >> "$GITHUB_OUTPUT"
            echo "wheel=$UPSTREAM_MATCH" >> "$GITHUB_OUTPUT"
            echo "Downloaded upstream wheel $UPSTREAM_MATCH"
            exit 0
          fi
          echo "mode=build" >> "$GITHUB_OUTPUT"
          echo "wheel=" >> "$GITHUB_OUTPUT"
          echo "No origin or upstream wheel found for $PREFIX"

      - name: Setup CUDA
        if: steps.check.outputs.mode == 'build'
        uses: ./.github/actions/setup-cuda
        with:
          cuda-version: "12.8"
          platform: linux
          installer-type: network
          extra-components: ""
          github-cache: "false"

      - name: Setup build environment
        if: steps.check.outputs.mode == 'build'
        uses: ./.github/actions/setup-build-env
        with:
          python-version: "3.12"
          pytorch-version: "2.11.0"
          cuda-short: "128"
          platform: linux
          extra-deps: "psutil"
          github-cache: "false"

      - name: Force exact PyTorch tuple
        if: steps.check.outputs.mode == 'build'
        shell: bash
        run: uv pip install --system --force-reinstall torch==2.11.0 torchvision==0.26.0 torchaudio==2.11.0 --index-url https://download.pytorch.org/whl/cu128

      - name: Build wheel
        if: steps.check.outputs.mode == 'build'
        uses: ./.github/actions/build-wheel
        with:
          source-repo: Dao-AILab/flash-attention
          source-tag: v2.8.3
          pre-build-script: ""
          arch-list: "8.0 9.0 10.0 12.0"
          cuda-version: "12.8"
          cuda-short: "128"
          pytorch-version: "2.11.0"
          platform: linux
          max-jobs: "6"
          clone-recursive: false
          patch-script: patches/flash_attn.py
          build-subdir: ""

      - name: Verify exact wheel
        if: steps.check.outputs.mode != 'origin_exists'
        shell: bash
        run: |
          PREFIX="flash_attn-2.8.3+cu128torch2.11-cp312-cp312-"
          MATCH=$(find dist -maxdepth 1 -name "${PREFIX}*.whl" -print -quit)
          if [ -z "$MATCH" ]; then
            echo "::error::Expected wheel prefix not found: $PREFIX"
            find dist -maxdepth 1 -name "*.whl" -print
            exit 1
          fi
          echo "Verified $MATCH"

      - name: Upload wheel artifact
        if: steps.check.outputs.mode != 'origin_exists'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: interceptor-flash-attn-py312-cu128-torch2.11.0
          path: dist/*.whl

