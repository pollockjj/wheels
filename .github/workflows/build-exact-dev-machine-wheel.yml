name: Build Exact Dev Machine Wheel
run-name: "Exact wheel: ${{ inputs.recipe }}"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UV_LINK_MODE: copy
  UV_HTTP_TIMEOUT: "600"

on:
  push:
    branches:
      - issue_100
    paths:
      - .github/workflows/build-exact-dev-machine-wheel.yml
      - recipes/dev_machine_wheels.json
      - scripts/dev_machine_wheel_recipe.py
  workflow_dispatch:
    inputs:
      recipe:
        description: "Exact wheel recipe"
        required: true
        type: choice
        options:
          - interceptor-flash-attn
          - interceptor-sageattention
          - llamatron-flash-attn
          - llamatron-sageattention
          - prosoche-flash-attn
          - prosoche-sageattention
          - prosoche-sageattn3
          - prosoche-flash-attn-3

concurrency:
  group: exact-dev-machine-wheel-${{ inputs.recipe || 'interceptor-flash-attn' }}
  cancel-in-progress: false

jobs:
  build-or-steal:
    name: ${{ inputs.recipe || 'interceptor-flash-attn' }}
    runs-on: [self-hosted, Linux, X64, fa3-builder, nasferatu-fa3]
    permissions:
      contents: read
    outputs:
      mode: ${{ steps.obtain.outputs.mode }}
      package: ${{ steps.recipe.outputs.package }}
      artifact_name: ${{ steps.recipe.outputs.artifact_name }}
      expected_wheel: ${{ steps.recipe.outputs.expected_wheel }}
      source_repo: ${{ steps.obtain.outputs.source_repo }}
      source_url: ${{ steps.obtain.outputs.source_url }}
    env:
      TMPDIR: /opt/runner/_work/_temp
      TMP: /opt/runner/_work/_temp
      TEMP: /opt/runner/_work/_temp
      RUNNER_MAX_JOBS: "6"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Confirm NASferatu runner
        shell: bash
        run: |
          case "${RUNNER_NAME:-$(hostname)}" in
            nasferatu-fa3|nasferatu*)
              ;;
            *)
              echo "::error::Expected NASferatu runner, got ${RUNNER_NAME:-$(hostname)}"
              exit 1
              ;;
          esac

      - name: Resolve exact recipe
        id: recipe
        shell: bash
        run: python scripts/dev_machine_wheel_recipe.py emit --recipe "${{ inputs.recipe || 'interceptor-flash-attn' }}"

      - name: Check origin and upstream
        id: obtain
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/dev_machine_wheel_recipe.py obtain --recipe "${{ inputs.recipe || 'interceptor-flash-attn' }}" --dist dist

      - name: Setup CUDA
        if: steps.obtain.outputs.mode == 'build'
        uses: ./.github/actions/setup-cuda
        with:
          cuda-version: ${{ steps.recipe.outputs.cuda }}
          platform: linux
          installer-type: network
          extra-components: ""
          github-cache: "false"

      - name: Setup build environment
        if: steps.obtain.outputs.mode == 'build'
        uses: ./.github/actions/setup-build-env
        with:
          python-version: ${{ steps.recipe.outputs.python }}
          pytorch-version: ${{ steps.recipe.outputs.pytorch }}
          cuda-short: ${{ steps.recipe.outputs.cuda_short }}
          platform: linux
          extra-deps: ${{ steps.recipe.outputs.extra_deps }}
          github-cache: "false"

      - name: Add swap space
        if: steps.obtain.outputs.mode == 'build' && (steps.recipe.outputs.package == 'sageattention' || steps.recipe.outputs.package == 'sageattn3')
        shell: bash
        run: |
          sudo fallocate -l 6G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile

      - name: Build wheel
        if: steps.obtain.outputs.mode == 'build'
        uses: ./.github/actions/build-wheel
        with:
          source-repo: ${{ steps.recipe.outputs.source_repo }}
          source-tag: ${{ steps.recipe.outputs.source_tag }}
          pre-build-script: ""
          arch-list: ${{ steps.recipe.outputs.arch_list }}
          cuda-version: ${{ steps.recipe.outputs.cuda }}
          cuda-short: ${{ steps.recipe.outputs.cuda_short }}
          pytorch-version: ${{ steps.recipe.outputs.pytorch }}
          platform: linux
          max-jobs: ${{ steps.recipe.outputs.max_jobs }}
          clone-recursive: ${{ steps.recipe.outputs.clone_recursive }}
          patch-script: ${{ steps.recipe.outputs.patch_script }}
          build-subdir: ${{ steps.recipe.outputs.build_subdir }}

      - name: Verify exact wheel
        if: steps.obtain.outputs.mode != 'origin_exists'
        shell: bash
        run: python scripts/dev_machine_wheel_recipe.py verify-dist --recipe "${{ inputs.recipe || 'interceptor-flash-attn' }}" --dist dist

      - name: Upload exact wheel artifact
        if: steps.obtain.outputs.mode != 'origin_exists'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.recipe.outputs.artifact_name }}
          path: dist/*.whl

  publish:
    name: publish ${{ inputs.recipe || 'interceptor-flash-attn' }}
    needs: build-or-steal
    if: needs.build-or-steal.outputs.mode != 'origin_exists'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download exact wheel artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build-or-steal.outputs.artifact_name }}
          path: dist

      - name: Publish exact wheel
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE="${{ needs.build-or-steal.outputs.package }}"
          RELEASE="${PACKAGE}-latest"
          INDEX_URL="$(python scripts/release_target.py --format index-url)"
          NOTES="Pre-built ${PACKAGE} wheels with CUDA support."$'\n\n'"**Install:**"$'\n'"\`\`\`bash"$'\n'"pip install ${PACKAGE} --extra-index-url ${INDEX_URL}"$'\n'"\`\`\`"
          gh release create "$RELEASE" \
            --title "${PACKAGE} CUDA Wheels" \
            --notes "$NOTES" \
            --latest=false \
            dist/*.whl \
            2>/dev/null || \
          gh release upload "$RELEASE" dist/*.whl --clobber

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Generate PEP 503 index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_index.py

      - name: Generate full build matrix page
        run: python scripts/fetch_torch_matrix.py --output docs/matrix/matrix.json --html docs/matrix

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
