name: Build torch_generic_nms

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref to build from ronghanghu/torch_generic_nms
        required: true
        type: string
        default: 'ronghanghu/torch_generic_nms'
      torch_minor:
        description: PyTorch minor version (e.g. 11 for 2.11.0)
        required: true
        type: string
        default: '11'
      torch_patch:
        description: PyTorch patch version (e.g. 0 for 2.11.0)
        required: true
        type: string
        default: '0'
      cuda_major:
        description: CUDA major version
        required: true
        type: string
        default: '13'
      cuda_minor:
        description: CUDA minor version
        required: true
        type: string
        default: '0'
      cuda_patch:
        description: CUDA patch version
        required: true
        type: string
        default: '0'
      python_version:
        description: Python version
        required: true
        type: string
        default: '3.12'
      cuda_arch_list:
        description: TORCH_CUDA_ARCH_LIST (space-separated)
        required: true
        type: string
        default: '8.6'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          sudo rm -rf /usr/share/swift &
          sudo rm -rf /usr/local/graalvm &
          sudo rm -rf /usr/local/.ghcup &
          sudo rm -rf /opt/hostedtoolcache/go &
          sudo apt-get clean &
          wait
          df -h

      - uses: actions/setup-python@v6
        with:
          python-version: '${{ inputs.python_version }}'

      - uses: Jimver/cuda-toolkit@v0.2.29
        with:
          cuda: '${{ inputs.cuda_major }}.${{ inputs.cuda_minor }}.${{ inputs.cuda_patch }}'
          use-github-cache: false

      - name: Clone source
        run: |
          git config --global core.autocrlf false
          git clone --branch ${{ inputs.source_ref }} --depth 1 https://github.com/ronghanghu/torch_generic_nms.git
          cd torch_generic_nms
          git rev-parse HEAD

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.${{ inputs.torch_minor }}.${{ inputs.torch_patch }} --index-url https://download.pytorch.org/whl/cu${{ inputs.cuda_major }}${{ inputs.cuda_minor }}
          pip install wheel setuptools ninja packaging

      - name: Build wheel
        env:
          TORCH_CUDA_ARCH_LIST: '${{ inputs.cuda_arch_list }}'
        run: |
          cd torch_generic_nms
          python setup.py bdist_wheel

      - name: Rename wheel with CUDA and torch tag
        run: |
          cd torch_generic_nms/dist
          for whl in *.whl; do
            BASENAME="${whl%%-cp*}"
            REST="${whl#$BASENAME-}"
            VERSION_TAG="${BASENAME#torch_generic_nms-}"
            CUDA_TORCH_TAG="+cu${{ inputs.cuda_major }}${{ inputs.cuda_minor }}torch2${{ inputs.torch_minor }}"
            NEW_NAME="torch_generic_nms-${VERSION_TAG}${CUDA_TORCH_TAG}-${REST}"
            mv "$whl" "$NEW_NAME"
            echo "Renamed: $whl -> $NEW_NAME"
          done
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: torch-generic-nms-wheel
          path: torch_generic_nms/dist/*.whl

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release_wheels
          cp torch_generic_nms/dist/*.whl release_wheels/
          gh release create torch_generic_nms-latest --title "torch_generic_nms CUDA Wheels" --latest=false release_wheels/*.whl 2>/dev/null || \
            gh release upload torch_generic_nms-latest release_wheels/*.whl --clobber
