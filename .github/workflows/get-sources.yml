name: Get Patched Sources
run-name: "Fetch sources: ${{ inputs.package }}"

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to fetch sources for"
        required: true
        type: choice
        options:
          - sageattention
          - flash_attn
          - sageattn3
          - cc_torch
          - torch_generic_nms

jobs:
  fetch-sources:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Fetch patched sources
        run: python scripts/fetch_patched_sources.py --package "${{ inputs.package }}" --output-dir patched-sources

      - name: Upload patched sources
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: patched-sources-${{ inputs.package }}
          path: patched-sources/
