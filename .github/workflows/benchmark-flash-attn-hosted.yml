name: Benchmark FlashAttn Hosted Runners
run-name: Benchmark flash_attn on GitHub-hosted Linux and Windows

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UV_LINK_MODE: copy
  UV_HTTP_TIMEOUT: "600"

on:
  push:
    branches:
      - issue_100
    paths:
      - .github/workflows/benchmark-flash-attn-hosted.yml
  workflow_dispatch:

jobs:
  build-linux:
    name: flash_attn linux github-hosted benchmark
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          sudo rm -rf /usr/share/swift &
          sudo rm -rf /usr/local/graalvm &
          sudo rm -rf /usr/local/.ghcup &
          sudo rm -rf /opt/hostedtoolcache/go &
          sudo apt-get clean &
          wait
          df -h

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Confirm runner and benchmark target
        shell: bash
        run: |
          mkdir -p benchmark-info
          PHYSICAL_CORES="$(lscpu -p=Core,Socket | grep -v '^#' | sort -u | wc -l)"
          LOGICAL_PROCESSORS="$(nproc)"
          TOTAL_RAM_GB="$(awk '/MemTotal/ { printf "%.1f", $2 / 1024 / 1024 }' /proc/meminfo)"
          {
            echo "RUNNER_NAME=${RUNNER_NAME:-$(hostname)}"
            echo "RUNNER_OS=${RUNNER_OS:-Linux}"
            echo "CONFIGURED_MAX_JOBS=auto"
            echo "PHYSICAL_CORES=$PHYSICAL_CORES"
            echo "LOGICAL_PROCESSORS=$LOGICAL_PROCESSORS"
            echo "TOTAL_RAM_GB=$TOTAL_RAM_GB"
            echo "CUDA_VERSION=12.6"
            echo "PYTORCH_VERSION=2.8.0"
            echo "PYTHON_VERSION=3.10"
            echo "ARCH_LIST=8.0 9.0"
          } | tee benchmark-info/runner.txt

      - name: Setup CUDA
        uses: ./.github/actions/setup-cuda
        with:
          cuda-version: "12.6"
          platform: linux
          installer-type: network
          extra-components: ""
          github-cache: "true"

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: "3.10"
          pytorch-version: "2.8.0"
          cuda-short: "126"
          platform: linux
          extra-deps: "psutil"
          github-cache: "true"

      - name: Build wheel
        uses: ./.github/actions/build-wheel
        with:
          source-repo: Dao-AILab/flash-attention
          source-tag: v2.8.3
          pre-build-script: ""
          arch-list: "8.0 9.0"
          cuda-version: "12.6"
          cuda-short: "126"
          pytorch-version: "2.8.0"
          platform: linux
          max-jobs: auto
          clone-recursive: false
          patch-script: patches/flash_attn.py
          build-subdir: ""

      - name: Capture local cache usage
        shell: bash
        run: |
          {
            echo "CUDA_CACHE_DIR=$GITHUB_WORKSPACE/.cuda-cache"
            echo "UV_CACHE_DIR=$HOME/.cache/uv"
            echo "PIP_CACHE_DIR=$HOME/.cache/pip"
            du -sh "$GITHUB_WORKSPACE/.cuda-cache" 2>/dev/null || true
            du -sh "$HOME/.cache/uv" 2>/dev/null || true
            du -sh "$HOME/.cache/pip" 2>/dev/null || true
          } | tee benchmark-info/cache.txt

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flash-attn-linux-gh-benchmark-py310-cu126-torch2.8.0
          path: |
            dist/*.whl
            benchmark-info/*.txt

  build-windows:
    name: flash_attn windows github-hosted benchmark
    runs-on: windows-2022
    permissions:
      contents: read

    steps:
      - name: Enable long paths
        shell: powershell
        run: git config --global core.longpaths true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Confirm runner and benchmark target
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force benchmark-info | Out-Null
          $runnerName = if ($env:RUNNER_NAME) { $env:RUNNER_NAME } else { $env:COMPUTERNAME }
          $physicalCores = (Get-CimInstance Win32_Processor | Measure-Object -Property NumberOfCores -Sum).Sum
          $logicalProcessors = (Get-CimInstance Win32_Processor | Measure-Object -Property NumberOfLogicalProcessors -Sum).Sum
          $memoryGb = [math]::Round((Get-CimInstance Win32_ComputerSystem).TotalPhysicalMemory / 1GB, 1)
          $driveC = Get-PSDrive C
          $usedGb = [math]::Round($driveC.Used / 1GB, 1)
          $freeGb = [math]::Round($driveC.Free / 1GB, 1)
          @(
            "RUNNER_NAME=$runnerName"
            "RUNNER_OS=Windows"
            "CONFIGURED_MAX_JOBS=auto"
            "PHYSICAL_CORES=$physicalCores"
            "LOGICAL_PROCESSORS=$logicalProcessors"
            "TOTAL_RAM_GB=$memoryGb"
            "C_DRIVE_USED_GB=$usedGb"
            "C_DRIVE_FREE_GB=$freeGb"
            "CUDA_VERSION=12.4"
            "PYTORCH_VERSION=2.6.0"
            "PYTHON_VERSION=3.12"
            "ARCH_LIST=8.0 9.0"
          ) | Set-Content benchmark-info\runner.txt
          Get-Content benchmark-info\runner.txt

      - name: Setup CUDA
        uses: ./.github/actions/setup-cuda
        with:
          cuda-version: "12.4"
          platform: windows
          installer-type: network
          extra-components: ""
          github-cache: "true"

      - name: Capture CUDA info
        shell: powershell
        run: |
          & "$env:CUDA_HOME\bin\nvcc.exe" --version | Set-Content benchmark-info\cuda.txt

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: "3.12"
          pytorch-version: "2.6.0"
          cuda-short: "124"
          platform: windows
          extra-deps: "psutil"
          github-cache: "true"

      - name: Capture Python and torch info
        shell: powershell
        run: |
          python -c "import sys; print(sys.version)" | Set-Content benchmark-info\python.txt
          python -c "import torch; print(torch.__version__); print(torch.version.cuda)" | Add-Content benchmark-info\python.txt

      - name: Build wheel
        uses: ./.github/actions/build-wheel
        with:
          source-repo: Dao-AILab/flash-attention
          source-tag: v2.8.3
          pre-build-script: ""
          arch-list: "8.0 9.0"
          cuda-version: "12.4"
          cuda-short: "124"
          pytorch-version: "2.6.0"
          platform: windows
          max-jobs: auto
          clone-recursive: false
          patch-script: patches/flash_attn.py
          build-subdir: ""

      - name: Capture local cache usage
        shell: powershell
        run: |
          @(
            "CUDA_HOME=$env:CUDA_HOME"
            "UV_CACHE=$env:LOCALAPPDATA\uv\cache"
            "PIP_CACHE=$env:LOCALAPPDATA\pip\Cache"
          ) | Set-Content benchmark-info\cache.txt

          foreach ($path in @(
            $env:CUDA_HOME,
            "$env:LOCALAPPDATA\uv\cache",
            "$env:LOCALAPPDATA\pip\Cache"
          )) {
            if (Test-Path $path) {
              $bytes = (Get-ChildItem $path -Recurse -Force -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum
              $gigabytes = [math]::Round(($bytes / 1GB), 2)
              Add-Content benchmark-info\cache.txt "$path`t$gigabytes GB"
            } else {
              Add-Content benchmark-info\cache.txt "$path`tMISSING"
            }
          }

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flash-attn-windows-gh-benchmark-py312-cu124-torch2.6.0
          path: |
            dist/*.whl
            benchmark-info/*.txt
