name: Rerun ComfyOrg Failing FlashAttn Linux Tuples
run-name: Rerun failing ComfyOrg Linux flash_attn tuples on prosoche and llamatron

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UV_LINK_MODE: copy
  UV_HTTP_TIMEOUT: "600"

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: linux flash_attn py${{ matrix.python }} cu${{ matrix.cuda_short }} torch${{ matrix.pytorch }}
    runs-on: [self-hosted, Linux, X64, fa3-builder, comfyorg-fa-rerun]
    env:
      TMPDIR: /opt/runner/_work/_temp
      TMP: /opt/runner/_work/_temp
      TEMP: /opt/runner/_work/_temp
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - python: "3.10"
            cuda: "12.8"
            cuda_short: "128"
            pytorch: "2.11.0"
          - python: "3.11"
            cuda: "12.8"
            cuda_short: "128"
            pytorch: "2.11.0"
          - python: "3.12"
            cuda: "12.8"
            cuda_short: "128"
            pytorch: "2.11.0"
          - python: "3.14"
            cuda: "12.8"
            cuda_short: "128"
            pytorch: "2.11.0"
          - python: "3.11"
            cuda: "12.8"
            cuda_short: "128"
            pytorch: "2.9.0"
          - python: "3.13"
            cuda: "12.8"
            cuda_short: "128"
            pytorch: "2.9.0"
          - python: "3.14"
            cuda: "12.8"
            cuda_short: "128"
            pytorch: "2.9.0"
          - python: "3.10"
            cuda: "12.9"
            cuda_short: "129"
            pytorch: "2.10.0"
          - python: "3.11"
            cuda: "12.9"
            cuda_short: "129"
            pytorch: "2.10.0"
          - python: "3.12"
            cuda: "12.9"
            cuda_short: "129"
            pytorch: "2.10.0"
          - python: "3.14"
            cuda: "12.9"
            cuda_short: "129"
            pytorch: "2.10.0"
          - python: "3.10"
            cuda: "12.9"
            cuda_short: "129"
            pytorch: "2.9.0"
          - python: "3.11"
            cuda: "12.9"
            cuda_short: "129"
            pytorch: "2.9.0"
          - python: "3.13"
            cuda: "12.9"
            cuda_short: "129"
            pytorch: "2.9.0"
          - python: "3.14"
            cuda: "12.9"
            cuda_short: "129"
            pytorch: "2.9.0"
          - python: "3.10"
            cuda: "13.0"
            cuda_short: "130"
            pytorch: "2.11.0"
          - python: "3.11"
            cuda: "13.0"
            cuda_short: "130"
            pytorch: "2.11.0"
          - python: "3.12"
            cuda: "13.0"
            cuda_short: "130"
            pytorch: "2.11.0"
          - python: "3.13"
            cuda: "13.0"
            cuda_short: "130"
            pytorch: "2.11.0"
          - python: "3.14"
            cuda: "13.0"
            cuda_short: "130"
            pytorch: "2.11.0"
          - python: "3.10"
            cuda: "13.0"
            cuda_short: "130"
            pytorch: "2.9.0"
          - python: "3.11"
            cuda: "13.0"
            cuda_short: "130"
            pytorch: "2.9.0"
          - python: "3.13"
            cuda: "13.0"
            cuda_short: "130"
            pytorch: "2.9.0"
          - python: "3.14"
            cuda: "13.0"
            cuda_short: "130"
            pytorch: "2.9.0"
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Confirm runner and tuple
        shell: bash
        run: |
          mkdir -p benchmark-info
          case "${RUNNER_NAME:-$(hostname)}" in
            prosoche-fa3|prosoche*) EXPECTED_MAX_JOBS=16 ;;
            llamatron-fa3|llamatron*) EXPECTED_MAX_JOBS=8 ;;
            *)
              echo "::error::Unexpected runner ${RUNNER_NAME:-$(hostname)}"
              exit 1
              ;;
          esac
          {
            echo "RUNNER_NAME=${RUNNER_NAME:-$(hostname)}"
            echo "EXPECTED_MAX_JOBS=$EXPECTED_MAX_JOBS"
            echo "PYTHON=${{ matrix.python }}"
            echo "CUDA=${{ matrix.cuda }}"
            echo "CUDA_SHORT=${{ matrix.cuda_short }}"
            echo "PYTORCH=${{ matrix.pytorch }}"
          } | tee benchmark-info/runner.txt

      - name: Setup CUDA
        uses: ./.github/actions/setup-cuda
        with:
          cuda-version: ${{ matrix.cuda }}
          platform: linux
          installer-type: network
          extra-components: ""
          github-cache: "false"

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: ${{ matrix.python }}
          pytorch-version: ${{ matrix.pytorch }}
          cuda-short: ${{ matrix.cuda_short }}
          platform: linux
          extra-deps: psutil
          github-cache: "false"

      - name: Build wheel
        uses: ./.github/actions/build-wheel
        with:
          source-repo: Dao-AILab/flash-attention
          source-tag: v2.8.3
          pre-build-script: ""
          arch-list: "8.0 9.0 10.0 12.0"
          cuda-version: ${{ matrix.cuda }}
          cuda-short: ${{ matrix.cuda_short }}
          pytorch-version: ${{ matrix.pytorch }}
          platform: linux
          max-jobs: auto
          clone-recursive: false
          patch-script: patches/flash_attn.py
          build-subdir: ""

      - name: Capture local cache usage
        shell: bash
        run: |
          CACHE_ROOT="${WHEELS_LOCAL_CACHE_ROOT:-${RUNNER_WORKSPACE:-$HOME}/../_wheels_cache}"
          {
            echo "CACHE_ROOT=$CACHE_ROOT"
            du -sh "$CACHE_ROOT" 2>/dev/null || true
          } | tee benchmark-info/cache.txt

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flash-attn-rerun-linux-py${{ matrix.python }}-cu${{ matrix.cuda_short }}-torch${{ matrix.pytorch }}
          path: |
            dist/*.whl
            benchmark-info/*.txt
