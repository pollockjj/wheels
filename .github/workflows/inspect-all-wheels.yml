name: Inspect All Wheels
run-name: "Inspect wheels: ${{ inputs.package }}"

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package release to inspect"
        required: true
        type: choice
        options:
          - sageattention
          - flash_attn
          - sageattn3
          - cc_torch
          - torch_generic_nms

jobs:
  inspect:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Download release wheels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p audit-wheels
          gh release download "${{ inputs.package }}-latest" --repo "${{ github.repository }}" -p "*.whl" -D audit-wheels

      - name: Install syft
        run: |
          curl -fsSL -o syft.tar.gz https://github.com/anchore/syft/releases/download/v1.42.4/syft_1.42.4_linux_amd64.tar.gz
          tar -xzf syft.tar.gz syft
          install -m 0755 syft /usr/local/bin/syft

      - name: Inspect wheels
        run: |
          python scripts/inspect_all_wheels.py --wheel-dir audit-wheels --output-json inspection_report.json --output-md inspection_report.md
          sha256sum audit-wheels/*.whl > SHA256SUMS.txt
          syft audit-wheels -o cyclonedx-json=sbom_manifest.json

      - name: Upload audit artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-audit-${{ inputs.package }}
          path: |
            SHA256SUMS.txt
            sbom_manifest.json
            inspection_report.json
            inspection_report.md

      - name: Attest audit artifact set
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            SHA256SUMS.txt
            sbom_manifest.json
            inspection_report.json
            inspection_report.md
