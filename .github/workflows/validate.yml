name: Validate Repository

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  ACTIONLINT_VERSION: v1.7.12
  SHELLCHECK_VERSION: v0.11.0

jobs:
  workflow-lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python -m pip install pyyaml

      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION_NO_V="${ACTIONLINT_VERSION#v}"
          ACTIONLINT_URL="https://github.com/rhysd/actionlint/releases/download/${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION_NO_V}_linux_amd64.tar.gz"
          curl -fsSL -o actionlint.tar.gz "${ACTIONLINT_URL}"
          tar -xzf actionlint.tar.gz actionlint
          install -m 0755 actionlint /usr/local/bin/actionlint

      - name: Install shellcheck
        run: |
          SHELLCHECK_URL="https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-v0.11.0.linux.x86_64.tar.xz"
          curl -fsSL -o shellcheck.tar.xz "${SHELLCHECK_URL}"
          tar -xJf shellcheck.tar.xz
          install -m 0755 shellcheck-v0.11.0/shellcheck /usr/local/bin/shellcheck

      - name: Run actionlint
        run: |
          actionlint -color
          echo "actionlint PASS"

      - name: Extract shell blocks
        run: python scripts/extract_workflow_shell_blocks.py --workflow-dir .github/workflows --action-dir .github/actions --output-dir .workflow-shells-shellcheck

      - name: Run shellcheck
        run: |
          find .workflow-shells-shellcheck -type f -name '*.sh' -print0 | xargs -0 shellcheck --severity=warning
          echo "shellcheck PASS"

  package-and-matrix:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Validate package specs
        run: python scripts/validate_package_specs.py --packages-dir packages

      - name: Generate matrix smoke test
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_matrix.py --package all --platform all --cuda all --overwrite --output matrix.json
          python -c "import json, pathlib; data=json.loads(pathlib.Path('matrix.json').read_text()); assert data['linux']['include']; assert 'windows_github' in data; assert 'windows_selfhosted' not in data"

  python-checks:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pytest pyyaml

      - name: Compile Python sources
        run: python -m compileall scripts/generate_matrix.py scripts/generate_index.py scripts/fetch_torch_matrix.py scripts/patch_wheel_version.py tests

      - name: Run pytest
        run: pytest -v tests/test_generate_matrix.py tests/test_generate_index.py tests/test_fetch_torch_matrix.py tests/test_patch_wheel_version.py
