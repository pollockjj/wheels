name: Build Exact FlashAttn Windows Wheel on Amor-Fati
run-name: Build flash_attn py3.13 cu130 torch2.11.0 on amor-fati

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UV_LINK_MODE: copy
  UV_HTTP_TIMEOUT: "600"

on:
  push:
    branches:
      - issue_100
    paths:
      - .github/workflows/build-exact-flash-attn-windows-amor-fati.yml
  workflow_dispatch:

concurrency:
  group: build-exact-flash-attn-windows-amor-fati
  cancel-in-progress: false

jobs:
  build-windows:
    name: flash_attn py3.13 cu130 torch2.11.0 on amor-fati
    runs-on: [self-hosted, Windows, X64]
    permissions:
      contents: read
    env:
      TMP: C:\actions-runner\_work\_temp
      TEMP: C:\actions-runner\_work\_temp
      WHEELS_LOCAL_CACHE_ROOT: C:/actions-runner/_wheels_cache

    steps:
      - name: Enable long paths
        shell: powershell
        run: git config --global core.longpaths true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Confirm runner and exact tuple
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force benchmark-info | Out-Null
          $runnerName = if ($env:RUNNER_NAME) { $env:RUNNER_NAME } else { $env:COMPUTERNAME }
          @(
            "RUNNER_NAME=$runnerName"
            "COMPUTERNAME=$env:COMPUTERNAME"
            "RUNNER_OS=$env:RUNNER_OS"
            "CONFIGURED_MAX_JOBS=6"
            "PYTHON=3.13"
            "CUDA=13.0"
            "CUDA_SHORT=130"
            "PYTORCH=2.11.0"
            "ARCH_LIST=8.6"
            "EXPECTED_WHEEL=flash_attn-2.8.3+cu130torch2.11-cp313-cp313-win_amd64.whl"
          ) | Set-Content benchmark-info\runner.txt
          Get-Content benchmark-info\runner.txt

      - name: Setup CUDA
        uses: ./.github/actions/setup-cuda
        with:
          cuda-version: "13.0"
          platform: windows
          installer-type: network
          extra-components: ""
          github-cache: "false"

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: "3.13"
          pytorch-version: "2.11.0"
          cuda-short: "130"
          platform: windows
          extra-deps: "psutil"
          github-cache: "false"

      - name: Capture Python and torch info
        shell: powershell
        run: |
          python -c "import sys; print(sys.version)" | Set-Content benchmark-info\python.txt
          python -c "import torch; print(torch.__version__); print(torch.version.cuda)" | Add-Content benchmark-info\python.txt

      - name: Build wheel
        uses: ./.github/actions/build-wheel
        with:
          source-repo: Dao-AILab/flash-attention
          source-tag: v2.8.3
          pre-build-script: ""
          arch-list: "8.6"
          cuda-version: "13.0"
          cuda-short: "130"
          pytorch-version: "2.11.0"
          platform: windows
          max-jobs: "6"
          clone-recursive: false
          patch-script: patches/flash_attn.py
          build-subdir: ""

      - name: Capture local cache usage
        shell: powershell
        run: |
          @(
            "WHEELS_LOCAL_CACHE_ROOT=$env:WHEELS_LOCAL_CACHE_ROOT"
            "UV_CACHE=$env:LOCALAPPDATA\uv\cache"
            "PIP_CACHE=$env:LOCALAPPDATA\pip\Cache"
          ) | Set-Content benchmark-info\cache.txt

      - name: Upload wheel artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flash-attn-windows-py313-cu130-torch2.11.0-amor-fati
          path: |
            dist/*.whl
            benchmark-info/*.txt
