name: Benchmark Flash3 Linux Runners
run-name: Benchmark flash_attn_3 on all three Linux runners

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UV_LINK_MODE: copy
  UV_HTTP_TIMEOUT: "600"

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: flash_attn_3 slot ${{ matrix.slot }}
    runs-on: [self-hosted, Linux, X64, fa3-builder]
    env:
      TMPDIR: /opt/runner/_work/_temp
      TMP: /opt/runner/_work/_temp
      TEMP: /opt/runner/_work/_temp
    strategy:
      fail-fast: false
      matrix:
        slot: [1, 2, 3]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Confirm runner and MAX_JOBS target
        shell: bash
        run: |
          mkdir -p benchmark-info
          case "${RUNNER_NAME:-$(hostname)}" in
            prosoche-fa3|prosoche*) EXPECTED_MAX_JOBS=16 ;;
            nasferatu-fa3|nasferatu*) EXPECTED_MAX_JOBS=6 ;;
            llamatron-fa3|llamatron*) EXPECTED_MAX_JOBS=8 ;;
            *) EXPECTED_MAX_JOBS="$(lscpu -p=Core,Socket | grep -v '^#' | sort -u | wc -l)" ;;
          esac
          echo "RUNNER_NAME=${RUNNER_NAME:-$(hostname)}" | tee benchmark-info/runner.txt
          echo "EXPECTED_MAX_JOBS=$EXPECTED_MAX_JOBS" | tee -a benchmark-info/runner.txt
          echo "RUNNER_WORKSPACE=${RUNNER_WORKSPACE:-}" | tee -a benchmark-info/runner.txt
          echo "WHEELS_LOCAL_CACHE_ROOT=${WHEELS_LOCAL_CACHE_ROOT:-${RUNNER_WORKSPACE:-$HOME}/../_wheels_cache}" | tee -a benchmark-info/runner.txt

      - name: Setup CUDA
        uses: ./.github/actions/setup-cuda
        with:
          cuda-version: "12.6"
          platform: linux
          installer-type: network
          extra-components: ""
          github-cache: "false"

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          python-version: "3.9"
          pytorch-version: "2.7.0"
          cuda-short: "126"
          platform: linux
          extra-deps: einops psutil
          github-cache: "false"

      - name: Build wheel
        uses: ./.github/actions/build-wheel
        with:
          source-repo: Dao-AILab/flash-attention
          source-tag: 3a7694c04748e3ba1cd954eb5dfdfd4b6646a234
          pre-build-script: ""
          arch-list: "8.0 9.0"
          cuda-version: "12.6"
          cuda-short: "126"
          pytorch-version: "2.7.0"
          platform: linux
          max-jobs: auto
          clone-recursive: false
          patch-script: ""
          build-subdir: hopper

      - name: Capture local cache usage
        shell: bash
        run: |
          CACHE_ROOT="${WHEELS_LOCAL_CACHE_ROOT:-${RUNNER_WORKSPACE:-$HOME}/../_wheels_cache}"
          {
            echo "CACHE_ROOT=$CACHE_ROOT"
            du -sh "$CACHE_ROOT" 2>/dev/null || true
            find "$CACHE_ROOT" -maxdepth 2 -type d 2>/dev/null | sort
          } | tee benchmark-info/cache.txt

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: flash-attn-3-benchmark-slot-${{ matrix.slot }}
          path: |
            dist/*.whl
            benchmark-info/*.txt
