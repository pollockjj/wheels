name: Build flash-attn

on:
  workflow_dispatch:
    inputs:
      git_tag:
        description: Git tag of flash-attention to build
        required: true
        type: string
        default: 'v2.8.3'
      torch_minor:
        description: PyTorch minor version (e.g. 11 for 2.11.0)
        required: true
        type: string
        default: '11'
      torch_patch:
        description: PyTorch patch version (e.g. 0 for 2.11.0)
        required: true
        type: string
        default: '0'
      cuda_major:
        description: CUDA major version
        required: true
        type: string
        default: '13'
      cuda_minor:
        description: CUDA minor version
        required: true
        type: string
        default: '0'
      cuda_patch:
        description: CUDA patch version
        required: true
        type: string
        default: '0'
      python_version:
        description: Python version
        required: true
        type: string
        default: '3.13'
      cuda_arch_list:
        description: TORCH_CUDA_ARCH_LIST (space-separated)
        required: true
        type: string
        default: '8.0 9.0 10.0 12.0'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          sudo rm -rf /usr/share/swift &
          sudo rm -rf /usr/local/graalvm &
          sudo rm -rf /usr/local/.ghcup &
          sudo rm -rf /opt/hostedtoolcache/go &
          sudo apt-get clean &
          wait
          df -h

      - uses: actions/setup-python@v6
        with:
          python-version: '${{ inputs.python_version }}'

      - uses: Jimver/cuda-toolkit@v0.2.29
        with:
          cuda: '${{ inputs.cuda_major }}.${{ inputs.cuda_minor }}.${{ inputs.cuda_patch }}'
          use-github-cache: false

      - name: Clone flash-attention
        run: |
          git config --global core.autocrlf false
          git clone --branch ${{ inputs.git_tag }} --depth 1 https://github.com/Dao-AILab/flash-attention.git
          cd flash-attention
          git rev-parse HEAD

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.${{ inputs.torch_minor }}.${{ inputs.torch_patch }} --index-url https://download.pytorch.org/whl/cu${{ inputs.cuda_major }}${{ inputs.cuda_minor }}
          pip install ninja packaging psutil wheel setuptools

      - name: Build wheel
        env:
          TORCH_CUDA_ARCH_LIST: '${{ inputs.cuda_arch_list }}'
          FLASH_ATTENTION_SKIP_CUDA_BUILD: 'FALSE'
          MAX_JOBS: '4'
        run: |
          cd flash-attention
          python setup.py bdist_wheel

      - name: Rename wheel with CUDA/torch tag
        run: |
          cd flash-attention/dist
          for whl in *.whl; do
            # Extract version from wheel filename: flash_attn-2.8.3-cp313-cp313-linux_x86_64.whl
            BASENAME="${whl%%-cp*}"
            REST="${whl#$BASENAME-}"
            VERSION_TAG="${BASENAME#flash_attn-}"
            CUDA_TORCH_TAG="+cu${{ inputs.cuda_major }}${{ inputs.cuda_minor }}torch2.${{ inputs.torch_minor }}.${{ inputs.torch_patch }}"
            NEW_NAME="flash_attn-${VERSION_TAG}${CUDA_TORCH_TAG}-${REST}"
            mv "$whl" "$NEW_NAME"
            echo "Renamed: $whl -> $NEW_NAME"
          done
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: flash-attn-wheel
          path: flash-attention/dist/*.whl

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release_wheels
          cp flash-attention/dist/*.whl release_wheels/
          ls release_wheels/
          gh release create flash_attn-latest --title "flash_attn CUDA Wheels" --latest=false release_wheels/*.whl 2>/dev/null || \
            gh release upload flash_attn-latest release_wheels/*.whl --clobber
