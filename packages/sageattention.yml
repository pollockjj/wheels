name: sageattention
source_repo: thu-ml/SageAttention
source_tag: v2.2.0
version: "2.2.0"

# SageAttention only supports SM >= 8.0 — qattn CUDA kernels use SM80+ intrinsics.
# Without this, the default arch_list includes 7.0 which fails to compile.
arch_list: "8.0 9.0"

# Optional: free disk space before build (default: false)
# Needed because PyTorch 2.8.0 uv cache is 3.3GB + CUDA toolkit
free_disk_space: true

# Optional: parallel compilation jobs (default: 1)
# Keep at 1: nvcc uses --threads=8 internally, and cu128 builds 8 arch targets.
# max_jobs=2 causes OOM on GitHub runners (4 vCPU, 7GB RAM).
max_jobs: 1

# Fix GCC-only CXX_FLAGS for Windows MSVC builds
patch_script: patches/sageattention.py

build_matrix:
  combinations:
    # ── cu124 (torch 2.4.0 – 2.6.0) ──
    - cuda: "12.4"
      pytorch: "2.4.0"
      python_versions: ["3.10", "3.11", "3.12"]
    - cuda: "12.4"
      pytorch: "2.5.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13"]
    - cuda: "12.4"
      pytorch: "2.6.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13"]
    # ── cu126 (torch 2.6.0 – 2.10.0) ──
    - cuda: "12.6"
      pytorch: "2.6.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13"]
    - cuda: "12.6"
      pytorch: "2.7.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13"]
    - cuda: "12.6"
      pytorch: "2.8.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13"]
    - cuda: "12.6"
      pytorch: "2.9.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    - cuda: "12.6"
      pytorch: "2.10.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    - cuda: "12.6"
      pytorch: "2.11.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    # ── cu128 (torch 2.7.0 – 2.10.0, Blackwell archs) ──
    - cuda: "12.8"
      pytorch: "2.7.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13"]
      arch_list: "8.0 9.0 10.0 12.0"
    - cuda: "12.8"
      pytorch: "2.8.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13"]
      arch_list: "8.0 9.0 10.0 12.0"
    - cuda: "12.8"
      pytorch: "2.9.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      arch_list: "8.0 9.0 10.0 12.0"
    - cuda: "12.8"
      pytorch: "2.10.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    - cuda: "12.8"
      pytorch: "2.11.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      arch_list: "8.0 9.0 10.0 12.0"
    # ── cu129 (torch 2.8.0 – 2.10.0, Blackwell archs) ──
    - cuda: "12.9"
      pytorch: "2.8.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13"]
      arch_list: "8.0 9.0 10.0 12.0"
    - cuda: "12.9"
      pytorch: "2.9.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      arch_list: "8.0 9.0 10.0 12.0"
    - cuda: "12.9"
      pytorch: "2.10.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      arch_list: "8.0 9.0 10.0 12.0"
    # ── cu130 (torch 2.9.0 – 2.10.0, Blackwell archs) ──
    - cuda: "13.0"
      pytorch: "2.9.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      arch_list: "8.0 9.0 10.0 12.0"
    - cuda: "13.0"
      pytorch: "2.10.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    - cuda: "13.0"
      pytorch: "2.11.0"
      python_versions: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      arch_list: "8.0 9.0 10.0 12.0"
  platforms: ["linux", "windows"]

extra_deps: ""
pre_build_script: ""
